apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-app-deployment
  labels:
    app: mini-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mini-app
  template:
    metadata:
      labels:
        app: mini-app
    spec:
      containers:
        - name: mini-app
          image: mini-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
